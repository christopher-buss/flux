autoInstallPeers: true
catalogMode: prefer
cleanupUnusedCatalogs: true
dedupePeers: true
ignoreWorkspaceRootCheck: true

minimumReleaseAgeExclude:
  - "@isentinel/eslint-config"
  - "@isentinel/rojo-utils@0.1.0"
  - eslint-plugin-flawless
  - eslint-plugin-roblox-ts@1.4.1
  - oxlint@1.75.0
  - oxlint-tsgolint@7.0.2001

publicHoistPattern:
  - "@typescript/*"

saveExact: true
shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - eslint-config-prettier@9.1.2
  - semver@6.3.1

trustPolicyIgnoreAfter: 10080

updateConfig:
  ignoreDependencies:
    - "@types/node"

packages:
  - e2e/*
  - packages/*
  - scripts

patchedDependencies:
  "@isentinel/roblox-ts@4.0.11": patches/@isentinel__roblox-ts@4.0.11.patch
  "@rbxts-js/emittery@3.16.0-ts.1": patches/@rbxts-js__emittery@3.16.0-ts.1.patch
  "@rbxts-js/expect@3.16.0-ts.1": patches/@rbxts-js__expect@3.16.0-ts.1.patch
  "@rbxts-js/jest-mock@3.16.0-ts.1": patches/@rbxts-js__jest-mock@3.16.0-ts.1.patch
  "@rbxts-js/jest-runner@3.16.0-ts.1": patches/@rbxts-js__jest-runner@3.16.0-ts.1.patch
  "@rbxts/compiler-types": patches/@rbxts__compiler-types@3.0.0-types.0.patch
  "@rbxts/jest-globals@3.16.0-ts.1": patches/@rbxts__jest-globals@3.16.0-ts.1.patch
  eslint-plugin-jest@29.15.5: patches/eslint-plugin-jest@29.15.5.patch

catalogs:
  build:
    "@isentinel/roblox-ts": 4.0.11
    turbo: 2.10.5
  cli:
    pncat: 0.12.0
  dev:
    std-env: 4.2.0
  lint:
    "@eslint/config-inspector": 3.1.0
    "@isentinel/eslint-config": 6.0.0-beta.19
    "@isentinel/hooks": 1.5.3
    "@vitest/eslint-plugin": 1.6.23
    eslint: 10.7.0
    eslint-plugin-jest: 29.15.5
    eslint-plugin-jest-extended: 3.0.1
    eslint-plugin-n: 18.2.2
    eslint-plugin-pnpm: 1.6.1
    eslint-plugin-react-hooks: 7.1.1
    eslint-plugin-react-jsx: 5.17.3
    eslint-plugin-react-naming-convention: 5.17.3
    eslint-plugin-react-x: 5.17.3
    eslint_d: 15.0.2
    file-entry-cache: 11.1.5
    get-tsconfig: 4.14.0
    madge: 8.0.0
    oxlint: 1.75.0
    oxlint-tsgolint: 7.0.2001
  node:
    rimraf: 6.1.3
  peer:
    "@rbxts/jecs": 0.11.0
    "@rbxts/react": 17.3.7-ts.2
    "@rbxts/react-roblox": 17.3.7-ts.2
  prod:
    "@rbxts/services": 1.6.0
  script:
    jiti: 2.7.0
  test:
    "@isentinel/jest-roblox": 0.3.10
    "@rbxts-js/dom-testing-library-lua": 8.16.0-ts.3
    "@rbxts-js/react-testing-library-lua": 12.3.4-ts.3
    "@rbxts/jest": 3.16.0-ts.1
    "@rbxts/jest-extended": 1.0.2
    "@rbxts/jest-globals": 3.16.0-ts.1
    "@rbxts/jest-utils": 0.1.3
    "@rbxts/regexp": 0.2.1-ts.4
    "@roblox-ts/rojo-resolver": npm:@isentinel/rojo-utils@0.1.0
    "@vitest/coverage-v8": 4.1.10
    rbxts-transformer-jest: 0.0.8
    vitest: 4.1.10
  tsc:
    "@isentinel/tsconfig": 1.2.0
    "@typescript/native-preview": 7.0.0-dev.20260707.2
    better-typescript-lib: ^2.12.0
    typescript: 6.0.3
  types:
    "@rbxts/compiler-types": 3.0.0-types.0
    "@rbxts/types": latest
    "@types/node": 24.13.3
    type-fest: 5.8.0

allowBuilds:
  esbuild: true
  unrs-resolver: true
