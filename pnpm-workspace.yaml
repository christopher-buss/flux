autoInstallPeers: true
catalogMode: prefer
cleanupUnusedCatalogs: true
ignoreWorkspaceRootCheck: true
saveExact: true
shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@6.3.1
  - chokidar@4.0.3

packages:
  - packages/*
  - scripts

catalogs:
  build:
    "@isentinel/roblox-ts": 3.1.0
  cli:
    pncat: 0.10.4
  dev:
    confbox: 0.2.2
    update-ts-references: 4.0.0
  lint:
    "@eslint/config-inspector": 1.4.2
    "@isentinel/eslint-config": 5.0.0-beta.9
    "@isentinel/hooks": 1.2.5
    eslint: 9.39.2
    eslint-plugin-jest: 29.15.0
    eslint-plugin-pnpm: 1.6.0
    eslint-plugin-react-hooks: 7.0.1
    eslint-plugin-react-naming-convention: 2.13.0
    eslint-plugin-react-x: 2.13.0
    eslint_d: 15.0.0
    file-entry-cache: 11.1.2
    get-tsconfig: 4.13.6
    madge: 8.0.0
  node:
    rimraf: 6.1.2
  prod:
    "@rbxts/services": 1.6.0
  script:
    jiti: 2.6.1
  test:
    "@isentinel/jest-roblox": 0.0.7
    "@rbxts/jest": 3.13.3-ts.1
    "@rbxts/jest-extended": 1.0.1
    "@rbxts/jest-globals": 3.13.3-ts.2
    "@rbxts/jest-utils": 0.1.3
    "@rbxts/react-roblox-fire": 0.1.4
    rbxts-transformer-jest: 0.0.5
  tsc:
    "@isentinel/tsconfig": 1.2.0
    "@typescript/native-preview": latest
    typescript: 5.9.3
  types:
    "@rbxts/compiler-types": 3.0.0-types.0
    "@rbxts/types": latest
    "@types/node": 24.10.4
    type-fest: 5.4.4

configDependencies:
  "@pnpm/plugin-trusted-deps": 0.2.0+sha512-jqiCC8kyrwOERwMWPo2RB1YlDMMS5WsPSA8Uwi3EXAYwyOSNtqKhrB9bs543JGUiz4yaA9h6nE3q98fG14AEyQ==

onlyBuiltDependencies:
  - unrs-resolver

updateConfig:
  ignoreDependencies:
    - "@types/node"
