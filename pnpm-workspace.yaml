autoInstallPeers: true
catalogMode: prefer
cleanupUnusedCatalogs: true
ignoreWorkspaceRootCheck: true
saveExact: true

minimumReleaseAgeExclude:
  - "@bedrock-rbx/ocale@0.1.0-beta.16"
  - "@isentinel/jest-roblox@0.3.4"

shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@6.3.1
  - chokidar@4.0.3

packages:
  - e2e/*
  - packages/*
  - scripts

patchedDependencies:
  "@rbxts-js/emittery@3.16.0-ts.1": patches/@rbxts-js__emittery@3.16.0-ts.1.patch
  "@rbxts-js/expect@3.16.0-ts.1": patches/@rbxts-js__expect@3.16.0-ts.1.patch

  "@rbxts/compiler-types": patches/@rbxts__compiler-types@3.0.0-types.0.patch
catalogs:
  build:
    "@isentinel/roblox-ts": 4.0.6
    turbo: 2.9.15
  cli:
    pncat: 0.11.1
  dev:
    confbox: 0.2.2
    std-env: 4.1.0
  lint:
    "@eslint/config-inspector": 1.5.0
    "@isentinel/eslint-config": 5.0.0-beta.11
    "@isentinel/hooks": 1.5.1
    eslint: 9.39.4
    eslint-plugin-jest: 29.15.2
    eslint-plugin-jest-extended: 3.0.1
    eslint-plugin-pnpm: 1.6.1
    eslint-plugin-react-hooks: 7.1.1
    eslint-plugin-react-naming-convention: 2.13.0
    eslint-plugin-react-x: 2.13.0
    eslint_d: 15.0.2
    file-entry-cache: 11.1.3
    get-tsconfig: 4.14.0
    madge: 8.0.0
  node:
    rimraf: 6.1.3
  peer:
    "@rbxts/jecs": 0.11.0
    "@rbxts/react": 17.3.7-ts.1
    "@rbxts/react-roblox": 17.3.7-ts.1
  prod:
    "@rbxts/services": 1.6.0
  script:
    jiti: 2.7.0
  test:
    "@isentinel/jest-roblox": 0.3.4
    "@rbxts-js/dom-testing-library-lua": 8.16.0-ts.2
    "@rbxts-js/react-testing-library-lua": 12.3.4-ts.2
    "@rbxts/jest": 3.16.0-ts.1
    "@rbxts/jest-extended": 1.0.1
    "@rbxts/jest-globals": 3.16.0-ts.1
    "@rbxts/jest-utils": 0.1.3
    "@rbxts/react-roblox-fire": 0.1.4
    "@rbxts/regexp": 0.2.1-ts.4
    rbxts-transformer-jest: 0.0.5
  tsc:
    "@isentinel/tsconfig": 1.2.0
    "@typescript/native-preview": 7.0.0-dev.20260527.1
    typescript: 6.0.3
  types:
    "@rbxts/compiler-types": 3.0.0-types.0
    "@rbxts/types": latest
    "@types/node": 24.12.4
    type-fest: 5.6.0

allowBuilds:
  esbuild: true
  unrs-resolver: true

updateConfig:
  ignoreDependencies:
    - "@types/node"
