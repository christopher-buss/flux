name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  CI: true
  HUSKY: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache ESLint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.*') }}
          path: .eslintcache
          restore-keys: eslint-${{ runner.os }}-

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: turbo-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          path: .turbo
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.job }}-
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm exec turbo run typecheck

      - name: Lint
        run: pnpm exec turbo run lint:ci

    timeout-minutes: 5

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: turbo-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          path: .turbo
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.job }}-
            turbo-${{ runner.os }}-

      - name: Test Scripts
        run: pnpm run test:scripts

      - env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
          ROBLOX_OPEN_CLOUD_API_KEY: ${{ secrets.ROBLOX_OPEN_CLOUD_API_KEY }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_PLACE_ID }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
        name: Test
        run: pnpm run test:affected -- --coverage --coverageReporters json-summary --coverageReporters json

      - if: ${{ always() && hashFiles('coverage/coverage-summary.json') != '' }}
        name: Coverage Report
        uses: davelosert/vitest-coverage-report-action@8b157684c6a6b259b97d45e72b44242865c0f6a5 # v2.12.2
        with:
          json-final-path: coverage/coverage-final.json
          json-summary-path: coverage/coverage-summary.json

    timeout-minutes: 10
